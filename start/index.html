<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Loading...</title>
  <noscript><meta http-equiv="refresh" content="0; url=/adv1"></noscript>
  <style>html,body{margin:0;background:#fff;}</style>
  <script>
  (function() {
    function getCookie(n) {
      var m = document.cookie.match(new RegExp('(?:^|; )' + n + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    function setCookie(n, v, days) {
      var d = new Date();
      d.setTime(d.getTime() + days * 86400000);
      document.cookie = n + '=' + v + '; expires=' + d.toUTCString() + '; path=/';
    }
    var params = new URLSearchParams(window.location.search);
    var forced = params.get('v');
    var variant = (forced === 'brand' || forced === 'adv') ? forced : getCookie('lander_variant');
    if (variant !== 'brand' && variant !== 'adv') {
      variant = Math.random() < 0.5 ? 'brand' : 'adv';
      setCookie('lander_variant', variant, 30);
    }
    params.delete('v');
    var clean = params.toString();
    var qs = clean ? '?' + clean : '';
    var dest = (variant === 'brand' ? '/brand1' : '/adv1') + qs;
    window.location.replace(dest);
  })();
  </script>
</head>
<body></body>
</html>
