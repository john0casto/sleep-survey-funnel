    function getCookie(name) {
      const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }

    function getUrlParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function generateEventId() {
      return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    }

    async function hashSHA256(value) {
      if (!value) return null;
      const data = new TextEncoder().encode(value.trim().toLowerCase());
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function fireCapiEvent(eventName, eventId, userData, customData) {
      const fbp = getCookie('_fbp');
      const fbc = getCookie('_fbc') || (getUrlParam('fbclid') ? 'fb.1.' + Date.now() + '.' + getUrlParam('fbclid') : null);

      const serverEvent = {
        event_name: eventName,
        event_time: Math.floor(Date.now() / 1000),
        event_id: eventId,
        event_source_url: window.location.href,
        action_source: 'website',
        user_data: {
          client_ip_address: null,
          client_user_agent: navigator.userAgent,
          fbp: fbp,
          fbc: fbc,
          ...userData
        },
        custom_data: customData || {}
      };

      try {
        await fetch(`https://graph.facebook.com/v21.0/${FB_PIXEL_ID}/events?access_token=${FB_CAPI_TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: [serverEvent] })
        });
      } catch (e) {
        console.warn('CAPI event failed:', e);
      }
    }

    // Fire PageView via CAPI on load
    (async () => {
      const pvEventId = generateEventId();
      fireCapiEvent('PageView', pvEventId, {});

n treatments for insomnia may include:\n\u2022 Cognitive behavioral therapy for insomnia (CBT-I)\n\u2022 Sleep hygiene practices (e.g., consistent bedtime, reducing screen time)\n\u2022 Lifestyle modifications, including stress management and regular exercise\n\nConsent and Acknowledgment\nI acknowledge that I have read and understand the information provided above. I understand the benefits, risks, and responsibilities associated with the use of this sleep medication. I agree to take the medication as prescribed and follow up with my healthcare provider as necessary.'

  {

  {

    id: 'q33',

const QUESTION_MAP = {};
QUESTIONS.forEach((q, i) => { QUESTION_MAP[q.id] = i; });

const PROGRESS_STAGES = 6;

let currentQuestionIndex = 0;
let answers = {};
let questionHistory = [];

// ============================================================================
// PROGRESS
// ============================================================================

function getProgressStage() {
  const totalQ = QUESTIONS.length;
  const stage = Math.floor((currentQuestionIndex / totalQ) * PROGRESS_STAGES);
  return Math.min(stage, PROGRESS_STAGES - 1);
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  const stage = getProgressStage();
  let html = '';
  for (let i = 0; i < PROGRESS_STAGES; i++) {
    html += `<div class="progress-dot${i <= stage ? ' completed' : ''}"></div>`;
    if (i < PROGRESS_STAGES - 1) {
      html += `<div class="progress-line${i < stage ? ' completed' : ''}"></div>`;
    }
  }
  bar.innerHTML = html;
}

// ============================================================================
// RENDER
// ============================================================================

function renderQuestion() {
  const q = QUESTIONS[currentQuestionIndex];
  const card = document.getElementById('questionCard');
  renderProgress();

  // Back button
  const backBtn = document.getElementById('backBtn');
  backBtn.className = questionHistory.length > 0 ? 'back-btn visible' : 'back-btn';

  let html = `<div class="question-text">${q.text}</div>`;
  if (q.subtext) html += `<div class="question-subtext">${q.subtext}</div>`;

  switch (q.type) {
    case 'single': html += renderSingle(q); break;
    case 'multi': html += renderMulti(q); break;
    case 'height': html += renderHeight(q); break;
    case 'number': html += renderNumber(q); break;
    case 'textarea': html += renderTextarea(q); break;
    case 'textarea_skip': html += renderTextareaSkip(q); break;
    case 'none_or_text': html += renderNoneOrText(q); break;
    case 'consent_scroll': html += renderConsentScroll(q); break;
    case 'name_form': html += renderNameForm(q); break;
    case 'dob': html += renderDob(q); break;
    case 'state_select': html += renderStateSelect(q); break;
    case 'email_form': html += renderEmailForm(q); break;
    case 'phone_form': html += renderPhoneForm(q); break;
    case 'hipaa': html += renderHipaa(q); break;
  }

  card.innerHTML = html;
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.3s ease';
  bindEvents(q);
}

function renderSingle(q) {
  const prev = answers[q.id];
  return '<div class="options-list">' +
    q.options.map(opt => {
      const sel = prev === opt ? ' selected' : '';
      return `<button class="option-btn${sel}" data-value="${opt}"><div class="option-radio"></div><div class="option-label">${opt}</div></button>`;
    }).join('') + '</div>';
}

function renderMulti(q) {
  const prev = answers[q.id] || [];
  return '<div class="options-list">' +
    q.options.map(opt => {
      const sel = prev.includes(opt) ? ' selected' : '';
      return `<button class="option-btn${sel}" data-value="${opt}"><div class="option-checkbox"></div><div class="option-label">${opt}</div></button>`;
    }).join('') + '</div>' +
    '<div class="select-hint">* Please select at least one option</div>' +
    `<button class="next-btn" id="nextBtn" ${prev.length === 0 ? 'disabled' : ''}>Next &rarr;</button>`;
}

function renderHeight(q) {
  const prev = answers[q.id] || {};
  let feetOpts = '<option value="0">0</option>';
  for (let i = 3; i <= 7; i++) feetOpts += `<option value="${i}"${prev.feet == i ? ' selected' : ''}>${i}</option>`;
  let inchOpts = '';
  for (let i = 0; i <= 11; i++) inchOpts += `<option value="${i}"${prev.inches == i ? ' selected' : ''}>${i}</option>`;
  return `<div class="question-text">What is your height in feet and inches? *</div>
    <div class="height-row">
      <div class="height-group"><label>Feet</label><select id="heightFeet">${feetOpts}</select></div>
      <div class="height-group"><label>Inches</label><select id="heightInches">${inchOpts}</select></div>
    </div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderNumber(q) {
  const prev = answers[q.id] || '';
  return `<input type="number" class="text-input" id="numberInput" placeholder="${q.placeholder || ''}" value="${prev}">
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderTextarea(q) {
  const prev = answers[q.id] || '';
  return `<textarea class="text-input" id="textInput" placeholder="${q.placeholder || ''}">${prev}</textarea>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderTextareaSkip(q) {
  const prev = answers[q.id] || '';
  return `<textarea class="text-input" id="textInput" placeholder="${q.placeholder || ''}">${prev}</textarea>
    <div class="skip-link" id="skipLink">Skip this question</div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderNoneOrText(q) {
  const prev = answers[q.id] || {};
  const noneSelected = prev.none ? ' selected' : '';
  return `<div class="options-list">
      <button class="option-btn${noneSelected}" data-value="none" id="noneBtn"><div class="option-radio"></div><div class="option-label">${q.noneLabel}</div></button>
    </div>
    <div class="or-divider">or type below</div>
    <textarea class="text-input" id="textInput" placeholder="${q.textPlaceholder || ''}">${prev.text || ''}</textarea>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderConsentScroll(q) {
  return `<div class="question-subtext" style="margin-top:-16px;margin-bottom:16px;">(Scroll down to confirm)</div>
    <div class="consent-box">${q.consentText.replace(/\n/g, '<br>')}</div>
    <button class="consent-agree-btn" id="agreeBtn">I have read the above information and I do consent and wish to move forward</button>
    <button class="consent-decline-btn" id="declineBtn">I have read the above information and I do not wish to continue</button>`;
}

function renderNameForm(q) {
  const prev = answers[q.id] || {};
  return `<div class="form-field"><label class="form-label">First Name</label><input type="text" id="firstName" placeholder="Enter your first name" value="${prev.first || ''}"></div>
    <div class="form-field"><label class="form-label">Last Name</label><input type="text" id="lastName" placeholder="Enter your last name" value="${prev.last || ''}"></div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderDob(q) {
  const prev = answers[q.id] || {};
  let months = '<option value="">Month</option>';
  const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  mNames.forEach((m,i) => { months += `<option value="${i+1}"${prev.month == i+1 ? ' selected' : ''}>${m}</option>`; });
  let days = '<option value="">Day</option>';
  for (let i = 1; i <= 31; i++) days += `<option value="${i}"${prev.day == i ? ' selected' : ''}>${i}</option>`;
  let years = '<option value="">Year</option>';
  const curYear = new Date().getFullYear();
  for (let i = curYear - 18; i >= curYear - 100; i--) years += `<option value="${i}"${prev.year == i ? ' selected' : ''}>${i}</option>`;
  return `<div class="form-field"><label class="form-label">Month</label><select id="dobMonth">${months}</select></div>
    <div class="form-field"><label class="form-label">Day</label><select id="dobDay">${days}</select></div>
    <div class="form-field"><label class="form-label">Year</label><select id="dobYear">${years}</select></div>
    <div class="select-hint">You must be at least 18 years old</div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderStateSelect(q) {
  const prev = answers[q.id] || '';
  let opts = '<option value="">Select a state</option>';
  US_STATES.forEach(s => { opts += `<option value="${s}"${prev === s ? ' selected' : ''}>${s}</option>`; });
  return `<div class="question-subtext" style="margin-top:-16px;margin-bottom:16px;">What state will this be shipped to?</div>
    <div class="form-field"><select id="stateSelect">${opts}</select></div>`;
}

function renderEmailForm(q) {
  const prev = answers[q.id] || '';
  return `<div class="form-field"><label class="form-label">Email</label><input type="email" id="emailInput" placeholder="Enter your email" value="${prev}"></div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderPhoneForm(q) {
  const prev = answers[q.id] || '';
  return `<div class="form-field"><label class="form-label">Phone Number</label><input type="tel" id="phoneInput" placeholder="(555) 123-4567" value="${prev}"></div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>`;
}

function renderHipaa(q) {
  return `<div class="hipaa-row">
      <input type="checkbox" id="hipaaCheck">
      <label for="hipaaCheck">I understand that my information is never shared, is protected by HIPAA and agree to the terms and privacy policies and to be contacted as necessary by Health Renewal Rx and its medical partners and can opt-out at anytime. *</label>
    </div>
    <button class="next-btn" id="nextBtn" disabled>Complete Assessment</button>`;
}

// ============================================================================
// EVENTS
// ============================================================================

function bindEvents(q) {
  switch (q.type) {
    case 'single':
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => handleSingleSelect(q, btn.dataset.value, e));
      });
      break;
    case 'multi':
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => handleMultiSelect(q, btn));
      });
      document.getElementById('nextBtn')?.addEventListener('click', () => goNext(q));
      break;
    case 'height':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const f = document.getElementById('heightFeet').value;
        const i = document.getElementById('heightInches').value;
        if (f && f !== '0') { answers[q.id] = { feet: f, inches: i }; goNext(q); }
      });
      break;
    case 'number':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const v = document.getElementById('numberInput').value;
        if (v) { answers[q.id] = v; goNext(q); }
      });
      break;
    case 'textarea':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const v = document.getElementById('textInput').value.trim();
        if (v) { answers[q.id] = v; goNext(q); }
      });
      break;
    case 'textarea_skip':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        answers[q.id] = document.getElementById('textInput').value.trim() || 'None';
        goNext(q);
      });
      document.getElementById('skipLink')?.addEventListener('click', () => {
        answers[q.id] = 'Skipped';
        goNext(q);
      });
      break;
    case 'none_or_text':
      document.getElementById('noneBtn')?.addEventListener('click', () => {
        const noneBtn = document.getElementById('noneBtn');
        noneBtn.classList.add('selected');
        document.getElementById('textInput').value = '';
        answers[q.id] = { none: true, text: '' };
        setTimeout(() => goNext(q), 400);
      });
      document.getElementById('textInput')?.addEventListener('input', () => {
        document.getElementById('noneBtn').classList.remove('selected');
      });
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const isNone = document.getElementById('noneBtn').classList.contains('selected');
        const text = document.getElementById('textInput').value.trim();
        if (isNone || text) {
          answers[q.id] = { none: isNone, text: isNone ? '' : text };
          goNext(q);
        }
      });
      break;
    case 'consent_scroll':
      document.getElementById('agreeBtn')?.addEventListener('click', () => {
        answers[q.id] = 'agreed';
        goNext(q);
      });
      document.getElementById('declineBtn')?.addEventListener('click', () => {
        showDQ("You have chosen not to continue. If you change your mind, you can restart the assessment.");
      });
      break;
    case 'name_form':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const first = document.getElementById('firstName').value.trim();
        const last = document.getElementById('lastName').value.trim();
        if (first && last) { answers[q.id] = { first, last }; goNext(q); }
      });
      break;
    case 'dob':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const m = document.getElementById('dobMonth').value;
        const d = document.getElementById('dobDay').value;
        const y = document.getElementById('dobYear').value;
        if (m && d && y) { answers[q.id] = { month: m, day: d, year: y }; goNext(q); }
      });
      break;
    case 'state_select':
      document.getElementById('stateSelect')?.addEventListener('change', () => {
        const v = document.getElementById('stateSelect').value;
        if (v) { answers[q.id] = v; goNext(q); }
      });
      break;
    case 'email_form':
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const v = document.getElementById('emailInput').value.trim();
        if (v && v.includes('@')) { answers[q.id] = v; goNext(q); }
      });
      break;
    case 'phone_form':
      document.getElementById('phoneInput')?.addEventListener('input', (e) => {
        let digits = e.target.value.replace(/\D/g, '').slice(0, 10);
        let formatted = '';
        if (digits.length > 0) formatted = '(' + digits.slice(0, 3);
        if (digits.length >= 3) formatted += ') ';
        if (digits.length > 3) formatted += digits.slice(3, 6);
        if (digits.length >= 6) formatted += '-';
        if (digits.length > 6) formatted += digits.slice(6, 10);
        e.target.value = formatted;
      });
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        const digits = document.getElementById('phoneInput').value.replace(/\D/g, '');
        if (digits.length === 10) { answers[q.id] = document.getElementById('phoneInput').value; goNext(q); }
      });
      break;
    case 'hipaa':
      document.getElementById('hipaaCheck')?.addEventListener('change', (e) => {
        document.getElementById('nextBtn').disabled = !e.target.checked;
      });
      document.getElementById('nextBtn')?.addEventListener('click', () => {
        if (document.getElementById('hipaaCheck').checked) {
          answers[q.id] = 'agreed';
          handleSubmit();
        }
      });
      break;
  }
}

let quizStartFired = false;
function handleSingleSelect(q, value, e) {
  answers[q.id] = value;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  e.currentTarget.classList.add('selected');

  // Fire ViewContent on first question answered (quiz started)
  if (q.id === 'q1' && !quizStartFired) {
    quizStartFired = true;
    const eid = generateEventId();
    fbq('trackCustom', 'QuizStart', {}, { eventID: eid });
    fireCapiEvent('ViewContent', eid, {}, { content_name: 'Sleep Survey Started' });
  }

  if (q.dqOn && value === q.dqOn) { setTimeout(() => showDQ(q.dqMessage), 400); return; }
  setTimeout(() => goNext(q), 400);
}

function handleMultiSelect(q, btn) {
  const value = btn.dataset.value;

  // "None apply" acts like a single-select auto-advance
  if (value === 'None apply') {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[q.id] = ['None apply'];
    setTimeout(() => goNext(q), 400);
    return;
  }

  // Deselect "None apply" if user picks a real option
  document.querySelectorAll('.option-btn').forEach(b => {
    if (b.dataset.value === 'None apply') b.classList.remove('selected');
  });

  btn.classList.toggle('selected');
  const selected = [];
  document.querySelectorAll('.option-btn.selected').forEach(b => selected.push(b.dataset.value));
  answers[q.id] = selected;
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.disabled = selected.length === 0;
}

// ============================================================================
// NAVIGATION
// ============================================================================

function goNext(q) {
  questionHistory.push(currentQuestionIndex);
  if (q.next) {
    const nextId = q.next(answers[q.id]);
    if (QUESTION_MAP[nextId] !== undefined) {
      currentQuestionIndex = QUESTION_MAP[nextId];
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
  }
  let nextIdx = currentQuestionIndex + 1;
  while (nextIdx < QUESTIONS.length) {
    const nextQ = QUESTIONS[nextIdx];
    if (/\d+[a-b]$/.test(nextQ.id)) { nextIdx++; continue; }
    break;
  }
  if (nextIdx >= QUESTIONS.length) { handleSubmit(); return; }
  currentQuestionIndex = nextIdx;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (questionHistory.length === 0) return;
  currentQuestionIndex = questionHistory.pop();
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showDQ(message) {
  document.getElementById('questionCard').innerHTML = `<div class="dq-screen">
    <h2>Thank You for Your Interest</h2>
    <p>${message}</p>
    <p style="margin-top:24px;font-size:14px;color:#888;">Did you answer the question correctly? If not, click below to go back.</p>
    <button onclick="goBack()" style="margin-top:8px;padding:10px 24px;background:#fff;border:1.5px solid #e0e3ea;border-radius:8px;font-size:14px;color:#555;cursor:pointer;font-family:inherit;">Return</button>
  </div>`;
}

async function handleSubmit() {
  document.getElementById('questionCard').innerHTML = `<div class="review-screen">
    <div class="loading-spinner"></div>
    <p><strong>Submitting your assessment...</strong></p>
    <p>A licensed provider will review your information and determine the best treatment plan for your sleep concerns.</p>
  </div>`;

  console.log('Survey answers:', answers);

  // Fire Lead event — Pixel + CAPI
  const leadEventId = generateEventId();
  const email = answers.q32 || '';
  const phone = (answers.q33 || '').replace(/\D/g, '');
  const firstName = answers.q29?.first || '';
  const lastName = answers.q29?.last || '';
  const state = answers.q31 || '';

  fbq('track', 'Lead', { content_name: 'Sleep Survey Complete' }, { eventID: leadEventId });

  const hashedUserData = {
    em: await hashSHA256(email),
    ph: await hashSHA256(phone),
    fn: await hashSHA256(firstName),
    ln: await hashSHA256(lastName),
    st: await hashSHA256(state),
    country: await hashSHA256('us')
  };
  fireCapiEvent('Lead', leadEventId, hashedUserData, { content_name: 'Sleep Survey Complete' });

  // TODO: POST answers to your backend
  // fetch('/api/survey/submit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(answers) })

  // Redirect to offer page with patient data
  setTimeout(() => {
    const offerParams = new URLSearchParams({
      first: answers.q29?.first || '',
      last: answers.q29?.last || '',
      email: answers.q32 || '',
      phone: answers.q33 || '',
      state: answers.q31 || '',
      severity: answers.q15 || 'Moderate',
      sleep: answers.q14 || '3–5 hrs',
      duration: answers.q3 || '3+ months',
    });
    window.location.href = 'offer.html?' + offerParams.toString();
  }, 2000);
}

renderQuestion();
</script>
